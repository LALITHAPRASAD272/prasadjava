trigger:
- main
variables:
- group: New variable group 14-Mar
pool:
  name: SelfHostedPool



steps:

- checkout: self

- script: |
    cd board
    mvn clean package
  displayName: Build Java App

- script: |
    cd board
    mvn sonar:sonar \
      -Dsonar.host.url=$(SONAR_HOST_URL) \
      -Dsonar.login=$(SONAR_TOKEN)
  displayName: SonarQube Scan

- script: |
    docker build -t $(IMAGE_NAME):v1 ./board
  displayName: Docker Build

- script: |
    trivy image $(IMAGE_NAME):v1
  displayName: Trivy Security Scan



- task: AzureCLI@2
  displayName: Login to ACR
  inputs:
    azureSubscription: 'Azure for Students(b92e8a3c-9e1b-4643-9df9-bea61f286443)'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      mkdir -p $AZURE_CONFIG_DIR
      az acr login --name $(ACR_NAME)
  env:
    AZURE_CONFIG_DIR: $(Agent.TempDirectory)/.azure

- script: |
    docker tag $(IMAGE_NAME):v1 $(ACR_NAME).azurecr.io/$(IMAGE_NAME):v1
  displayName: Tag Image

- script: |
    docker push $(ACR_NAME).azurecr.io/$(IMAGE_NAME):v1
  displayName: Push Image

- script: |
    kubectl apply -f board/k8s/deployment.yaml
    kubectl apply -f board/k8s/service.yaml
  displayName: Deploy to AKS